name: Deploy Contract AgentOps Demo

on:
  push:
    branches: [main]
    paths:
      - 'contract-agentops-demo/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

defaults:
  run:
    working-directory: contract-agentops-demo

env:
  AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME || 'contract-agentops' }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: contract-agentops-demo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Lint
        run: npm run lint || true

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Log in with Azure (Federated Credentials)
        run: |
          azd auth login `
            --client-id "${{ secrets.AZURE_CLIENT_ID }}" `
            --federated-credential-provider "github" `
            --tenant-id "${{ secrets.AZURE_TENANT_ID }}"

      - name: Set azd env variables
        run: |
          azd env new ${{ env.AZURE_ENV_NAME }} --no-prompt
          azd env set AZURE_LOCATION "${{ vars.AZURE_LOCATION || 'eastus2' }}"
          azd env set FOUNDRY_ENDPOINT "${{ secrets.FOUNDRY_ENDPOINT }}"
          azd env set FOUNDRY_API_KEY "${{ secrets.FOUNDRY_API_KEY }}"
          azd env set FOUNDRY_MODEL "${{ vars.FOUNDRY_MODEL || 'gpt-4o' }}"
          azd env set DEMO_MODE "${{ vars.DEMO_MODE || 'live' }}"

      - name: Provision and Deploy
        run: azd up --no-prompt
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Output deployment info
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          APP_URL=$(azd env get-value AZURE_APP_SERVICE_URL 2>/dev/null || echo "unknown")
          echo "- **App URL**: ${APP_URL}" >> $GITHUB_STEP_SUMMARY
          echo "- **Health**: ${APP_URL}/api/v1/health" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ env.AZURE_ENV_NAME }}" >> $GITHUB_STEP_SUMMARY
